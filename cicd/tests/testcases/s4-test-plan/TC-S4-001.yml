id: TC-S4-001
name: "Flow: create_test_plan + add_test_case_to_test_plan"
suite: s4-test-plan
priority: 2
timeout: 30000
dependencies: [TC-S2-002]

# Creates a test plan (keyed by project NAME, per the tool contract) and adds
# the flow case to it. Publishes plan_id for s5/s6/teardown.

steps:
  - name: "Create or reuse the flow test plan (idempotent)"
    command: |
      PNAME=$(cat /tmp/tl-flow/project_name); PID=$(cat /tmp/tl-flow/project_id)
      PLANS=$(npx tsx cicd/tests/src/mcp-client.ts list_test_plans "{\"project_id\":\"$PID\"}" 2>/dev/null)
      PLAN=$(echo "$PLANS" | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); d=d if isinstance(d,list) else []; m=[p for p in d if p.get('name')=='Flow Plan']; print(m[0]['id'] if m else '')")
      if [ -z "$PLAN" ]; then
        RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_plan "{\"data\":{\"project_id\":\"$PNAME\",\"name\":\"Flow Plan\",\"notes\":\"flow\"}}" 2>/dev/null)
        PLAN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); o=d[0] if isinstance(d,list) else d; print(o.get('id') or o['additionalInfo']['id'])")
      fi
      echo "$PLAN" > /tmp/tl-flow/plan_id
      echo "PLAN_READY=$PLAN"
    timeout: 20000
    expectPatterns:
      - "PLAN_READY=[0-9]+"

  - name: "Add the flow case to the plan"
    command: |
      PID=$(cat /tmp/tl-flow/project_id); PLAN=$(cat /tmp/tl-flow/plan_id); CASE=$(cat /tmp/tl-flow/case_ext_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts add_test_case_to_test_plan "{\"data\":{\"testcaseid\":\"$CASE\",\"testplanid\":\"$PLAN\",\"testprojectid\":\"$PID\",\"version\":1}}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'add to plan errored'; print('ADD_TO_PLAN_OK')"
    timeout: 20000
    expectPatterns:
      - "ADD_TO_PLAN_OK"

criteria: |
  create_test_plan creates a plan in the flow project and
  add_test_case_to_test_plan links the flow case to it.
goal: "Create a plan and add the flow case via the MCP tools"
