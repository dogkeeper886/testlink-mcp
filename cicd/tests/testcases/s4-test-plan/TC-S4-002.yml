id: TC-S4-002
name: "Flow: get_test_cases_for_test_plan"
suite: s4-test-plan
priority: 3
timeout: 30000
dependencies: [TC-S4-001]

steps:
  - name: "Get cases for the plan and confirm the flow case is linked"
    command: |
      PLAN=$(cat /tmp/tl-flow/plan_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts get_test_cases_for_test_plan "{\"plan_id\":\"$PLAN\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; t=json.load(sys.stdin)['content'][0]['text']; assert 'Flow Case' in t,'flow case not in plan'; print('PLAN_CASES_OK')"
    timeout: 20000
    expectPatterns:
      - "PLAN_CASES_OK"

criteria: |
  get_test_cases_for_test_plan returns the case linked in TC-S4-001.
goal: "Read plan cases via the MCP get_test_cases_for_test_plan tool"
