id: TC-TOOL-014
name: "MCP Tool: create_test_execution + read_test_execution"
suite: tool
priority: 14
timeout: 45000
dependencies: [TC-TOOL-000]

steps:
  - name: "Create a build for execution"
    command: |
      STAMP=$(date +%s)
      BUILD_NAME="CI-Exec-$STAMP"
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_build \
        "{\"data\":{\"plan_id\":\"172\",\"name\":\"$BUILD_NAME\",\"notes\":\"Build for TC-TOOL-014\"}}" \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      BUILD_ID=$(echo "$TEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('id','') if isinstance(d,list) else d.get('id',''))")
      echo "EXEC_BUILD_ID=$BUILD_ID"
      echo "$BUILD_ID" > /tmp/tc-tool-014-build-id.txt
    timeout: 15000
    expectPatterns:
      - "EXEC_BUILD_ID="

  - name: "Record a test execution (pass)"
    command: |
      BUILD_ID=$(cat /tmp/tc-tool-014-build-id.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_execution \
        "{\"data\":{\"test_case_id\":\"170\",\"plan_id\":\"172\",\"build_id\":\"$BUILD_ID\",\"status\":\"p\",\"notes\":\"Executed by TC-TOOL-014\"}}" \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      echo "$TEXT" | grep -q "status" && echo "EXECUTION_RECORDED"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "EXECUTION_OK" || echo "EXECUTION_FAILED"
    timeout: 15000
    expectPatterns:
      - "EXECUTION_OK"

  - name: "Verify execution via get_test_cases_for_test_plan"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts get_test_cases_for_test_plan \
        '{"plan_id":"172"}' \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      python3 -c "
      import json
      data = json.loads('''$(echo "$TEXT")''')
      case = data.get('170', [{}])[0]
      status = case.get('exec_status', 'n')
      if status == 'p':
          print('EXEC_STATUS_PASS')
      else:
          print(f'EXEC_STATUS={status}')
      "
    timeout: 15000
    expectPatterns:
      - "EXEC_STATUS_PASS"

criteria: |
  Verify that:
  - create_test_execution records a pass result for case 170 (tm-3) in plan 172
  - The execution is confirmed via get_test_cases_for_test_plan showing exec_status=p

goal: "Test create_test_execution MCP tool and verify execution was recorded"
