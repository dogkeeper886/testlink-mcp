id: TC-TOOL-011
name: "MCP Tool: add_test_case_to_test_plan"
suite: tool
priority: 11
timeout: 45000
dependencies: [TC-TOOL-000]

steps:
  - name: "Create a temporary test plan"
    command: |
      STAMP=$(date +%s)
      PLAN_NAME="CI-AddCase-$STAMP"
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_plan \
        "{\"data\":{\"project_id\":\"testlink-mcp\",\"name\":\"$PLAN_NAME\",\"notes\":\"Temp plan for TC-TOOL-011\"}}" \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      PLAN_ID=$(echo "$TEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('id','') if isinstance(d,list) else d.get('id',''))")
      echo "TEMP_PLAN_ID=$PLAN_ID"
      echo "$PLAN_ID" > /tmp/tc-tool-011-plan-id.txt
    timeout: 15000
    expectPatterns:
      - "TEMP_PLAN_ID="

  - name: "Add test case tm-1 to the plan"
    command: |
      PLAN_ID=$(cat /tmp/tc-tool-011-plan-id.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts add_test_case_to_test_plan \
        "{\"data\":{\"testcaseid\":\"tm-1\",\"testplanid\":\"$PLAN_ID\",\"testprojectid\":\"162\"}}" \
        2>/dev/null)
      echo "$RESULT"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "ADD_CASE_OK" || echo "ADD_CASE_FAILED"
    timeout: 15000
    expectPatterns:
      - "ADD_CASE_OK"

  - name: "Verify case appears in plan"
    command: |
      PLAN_ID=$(cat /tmp/tc-tool-011-plan-id.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts get_test_cases_for_test_plan \
        "{\"plan_id\":\"$PLAN_ID\"}" \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      echo "$TEXT" | grep -q "Read Test Case" && echo "VERIFY_CASE_IN_PLAN"
    timeout: 15000
    expectPatterns:
      - "VERIFY_CASE_IN_PLAN"

  - name: "Cleanup: delete temporary plan"
    command: |
      PLAN_ID=$(cat /tmp/tc-tool-011-plan-id.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_test_plan \
        "{\"plan_id\":\"$PLAN_ID\"}" \
        2>/dev/null)
      echo "$RESULT"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "CLEANUP_OK" || echo "CLEANUP_FAILED"
    timeout: 15000
    expectPatterns:
      - "CLEANUP_OK"

criteria: |
  Verify that:
  - add_test_case_to_test_plan assigns test case tm-1 to a plan
  - get_test_cases_for_test_plan confirms the case is in the plan
  - Cleanup: temporary plan is deleted after verification

goal: "Test the add_test_case_to_test_plan MCP tool end-to-end"
