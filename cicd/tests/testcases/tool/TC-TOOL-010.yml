id: TC-TOOL-010
name: "MCP Tool: create_test_plan"
suite: tool
priority: 10
timeout: 30000
dependencies: [TC-TOOL-000]

steps:
  - name: "Create a test plan"
    command: |
      STAMP=$(date +%s)
      PLAN_NAME="CI-Plan-$STAMP"
      echo "$PLAN_NAME" > /tmp/tc-tool-010-name.txt
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_plan \
        "{\"data\":{\"project_id\":\"testlink-mcp\",\"name\":\"$PLAN_NAME\",\"notes\":\"Created by TC-TOOL-010\"}}" \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      PLAN_ID=$(echo "$TEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('id','') if isinstance(d,list) else d.get('id',''))")
      echo "CREATED_PLAN_ID=$PLAN_ID"
      echo "$PLAN_ID" > /tmp/tc-tool-010-plan-id.txt
    timeout: 15000
    expectPatterns:
      - "CREATED_PLAN_ID="

  - name: "Verify plan appears in listing"
    command: |
      PLAN_NAME=$(cat /tmp/tc-tool-010-name.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts list_test_plans \
        '{"project_id":"162"}' \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      echo "$TEXT" | grep -q "$PLAN_NAME" && echo "VERIFY_PLAN_OK"
    timeout: 15000
    expectPatterns:
      - "VERIFY_PLAN_OK"

  - name: "Delete created plan"
    command: |
      PLAN_ID=$(cat /tmp/tc-tool-010-plan-id.txt)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_test_plan \
        "{\"plan_id\":\"$PLAN_ID\"}" \
        2>/dev/null)
      echo "$RESULT"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "DELETE_OK" || echo "DELETE_FAILED"
    timeout: 15000
    expectPatterns:
      - "DELETE_OK"

criteria: |
  Verify that:
  - create_test_plan creates a plan in project 162
  - The created plan appears in list_test_plans output
  - Cleanup: the created plan is deleted after verification

goal: "Test the create_test_plan MCP tool with create, verify, and cleanup"
