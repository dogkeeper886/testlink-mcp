id: TC-S7-001
name: "Flow: list_requirements"
suite: s7-requirements
priority: 2
timeout: 30000
dependencies: [TC-S2-001]

steps:
  - name: "List requirements for the flow project"
    command: |
      PID=$(cat /tmp/tl-flow/project_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts list_requirements "{\"project_id\":\"$PID\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'list_requirements errored'; d=json.loads(r['content'][0]['text']); assert isinstance(d,list),'expected a list'; print('LIST_REQS_OK')"
    timeout: 20000
    expectPatterns:
      - "LIST_REQS_OK"

criteria: |
  list_requirements returns a list for the flow project (empty is valid — the
  flow does not create requirements, since there is no create_requirement tool).
goal: "List requirements via the MCP list_requirements tool"
