id: TC-S7-003
name: "Flow: teardown (close build, delete case/plan/req-spec/suite)"
suite: s7-requirements
priority: 9
timeout: 60000
# Final stage. Depends on every fixture-consuming test so it runs last and
# does not pull data out from under them.
dependencies: [TC-S2-003, TC-S2-004, TC-S3-001, TC-S3-002, TC-S3-003, TC-S3-004, TC-S4-002, TC-S6-001, TC-S7-001, TC-S7-002]

steps:
  - name: "Close the build"
    command: |
      BUILD=$(cat /tmp/tl-flow/build_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts close_build "{\"build_id\":\"$BUILD\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'close_build errored'; print('BUILD_CLOSED_OK')"
    timeout: 20000
    expectPatterns:
      - "BUILD_CLOSED_OK"

  - name: "Delete the test case and confirm it is gone"
    command: |
      TC=$(cat /tmp/tl-flow/case_ext_id)
      npx tsx cicd/tests/src/mcp-client.ts delete_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null >/dev/null
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts read_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); txt=r['content'][0]['text']; assert r.get('isError') or 'does not exist' in txt,'case still exists after delete'; print('CASE_DELETED_OK')"
    timeout: 20000
    expectPatterns:
      - "CASE_DELETED_OK"

  - name: "Delete the test plan"
    command: |
      PLAN=$(cat /tmp/tl-flow/plan_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_test_plan "{\"plan_id\":\"$PLAN\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'delete_test_plan errored'; print('PLAN_DELETED_OK')"
    timeout: 20000
    expectPatterns:
      - "PLAN_DELETED_OK"

  - name: "Delete the requirement specification (cascades to its requirement)"
    command: |
      RS=$(cat /tmp/tl-flow/reqspec_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_requirement_specification "{\"reqspec_id\":\"$RS\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'delete_requirement_specification errored'; print('REQSPEC_DELETED_OK')"
    timeout: 20000
    expectPatterns:
      - "REQSPEC_DELETED_OK"

  - name: "Delete the child test suite"
    command: |
      CID=$(cat /tmp/tl-flow/child_suite_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_test_suite "{\"suite_id\":\"$CID\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'delete child test_suite errored'; print('CHILD_SUITE_DELETED_OK')"
    timeout: 20000
    expectPatterns:
      - "CHILD_SUITE_DELETED_OK"

  - name: "Delete the test suite (now empty)"
    command: |
      SID=$(cat /tmp/tl-flow/suite_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts delete_test_suite "{\"suite_id\":\"$SID\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'delete_test_suite errored'; print('SUITE_DELETED_OK')"
    timeout: 20000
    expectPatterns:
      - "SUITE_DELETED_OK"

criteria: |
  Teardown closes the build, hard-deletes the case (verified gone), and deletes
  the plan, requirement spec (cascading its requirement), and suite — leaving
  only the empty project for the next run.
goal: "Tear down all flow fixtures via the MCP close/delete tools"
