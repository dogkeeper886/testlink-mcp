id: TC-S2-001
name: "Flow: provision project + suite fixtures"
suite: s2-test-case
priority: 1
timeout: 60000
dependencies: [TC-S1-001]

# First stage of the end-to-end flow. Provisions the shared fixtures every
# later stage consumes, published under /tmp/tl-flow/. Idempotent.
# (Project creation is not an MCP tool, so it is created out-of-band.)

steps:
  - name: "Ensure project fixture (out-of-band)"
    command: |
      mkdir -p /tmp/tl-flow
      P=$(npx tsx cicd/tests/src/flow-provision.ts 2>/dev/null)
      echo "$P" | python3 -c "import sys,json; d=json.load(sys.stdin); open('/tmp/tl-flow/project_id','w').write(d['id']); open('/tmp/tl-flow/project_name','w').write(d['name']); open('/tmp/tl-flow/prefix','w').write(d['prefix'])"
      echo "PROVISION_PROJECT_OK $(cat /tmp/tl-flow/project_id) $(cat /tmp/tl-flow/prefix)"
    timeout: 30000
    expectPatterns:
      - "PROVISION_PROJECT_OK [0-9]+"

  - name: "Ensure suite fixture (idempotent via MCP)"
    command: |
      PID=$(cat /tmp/tl-flow/project_id)
      SUITES=$(npx tsx cicd/tests/src/mcp-client.ts list_test_suites "{\"project_id\":\"$PID\"}" 2>/dev/null)
      SID=$(echo "$SUITES" | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); d=d if isinstance(d,list) else []; m=[s for s in d if s.get('name')=='Flow Suite']; print(m[0]['id'] if m else '')")
      if [ -z "$SID" ]; then
        CS=$(npx tsx cicd/tests/src/mcp-client.ts create_test_suite "{\"project_id\":\"$PID\",\"suite_name\":\"Flow Suite\",\"details\":\"flow fixture\"}" 2>/dev/null)
        SID=$(echo "$CS" | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); s=d[0] if isinstance(d,list) else d; print(s['id'])")
      fi
      echo "$SID" > /tmp/tl-flow/suite_id
      [ -n "$SID" ] && echo "PROVISION_SUITE_OK suite=$SID"
    timeout: 30000
    expectPatterns:
      - "PROVISION_SUITE_OK suite=[0-9]+"

criteria: |
  Provision shared flow fixtures: a dedicated project (out-of-band, since project
  creation is not an MCP tool) and a reusable top-level "Flow Suite". Publishes
  project_id, project_name, prefix, suite_id to /tmp/tl-flow/.
goal: "Provision project + suite fixtures for the end-to-end flow"
