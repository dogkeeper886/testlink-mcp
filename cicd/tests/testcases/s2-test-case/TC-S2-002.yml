id: TC-S2-002
name: "Flow: create_test_case"
suite: s2-test-case
priority: 2
timeout: 30000
dependencies: [TC-S2-001]

# Creates the test case the rest of the flow operates on. Publishes its
# external ID to /tmp/tl-flow/case_ext_id.

steps:
  - name: "Create a test case in the flow suite"
    command: |
      PID=$(cat /tmp/tl-flow/project_id); SID=$(cat /tmp/tl-flow/suite_id); PREFIX=$(cat /tmp/tl-flow/prefix)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_case "{\"data\":{\"testprojectid\":\"$PID\",\"testsuiteid\":\"$SID\",\"name\":\"Flow Case\",\"authorlogin\":\"admin\",\"summary\":\"<p>ORIGINAL</p>\",\"preconditions\":\"<p>PRECOND_MARKER</p>\",\"importance\":2,\"execution_type\":1,\"status\":1,\"steps\":[{\"step_number\":1,\"actions\":\"<p>do</p>\",\"expected_results\":\"<p>ok</p>\",\"execution_type\":1}]}}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; a=json.loads(json.load(sys.stdin)['content'][0]['text'])[0]['additionalInfo']; open('/tmp/tl-flow/case_internal_id','w').write(str(a['id'])); open('/tmp/tl-flow/case_ext_id','w').write(open('/tmp/tl-flow/prefix').read().strip()+'-'+str(a['external_id']))"
      echo "CREATED=$(cat /tmp/tl-flow/case_ext_id) internal=$(cat /tmp/tl-flow/case_internal_id)"
    timeout: 20000
    expectPatterns:
      - "CREATED=[A-Za-z0-9]+-[0-9]+"

criteria: |
  create_test_case creates a case in the flow suite with summary and
  preconditions populated (issue #51 regression). Publishes case_ext_id.
goal: "Create the flow's test case via the MCP create_test_case tool"
