id: TC-S2-CRUD
name: "MCP Tool: self-contained test-case CRUD lifecycle"
suite: s2-test-case
priority: 1
timeout: 60000
dependencies: []

# Self-contained: bootstraps its own project/suite fixtures (no hardcoded
# case IDs), then exercises create -> read -> update -> delete, verifying
# each mutation by reading it back through the MCP server.
# Precondition: the TestLink instance has at least one project.

steps:
  - name: "Setup: discover project, create a fresh suite"
    command: |
      PROJ=$(npx tsx cicd/tests/src/mcp-client.ts list_projects '{}' 2>/dev/null | python3 -c "
      import sys,json
      d=json.loads(json.load(sys.stdin)['content'][0]['text'])
      assert isinstance(d,list) and d, 'no projects in TestLink'
      print(d[0]['id']+'|'+d[0]['prefix'])")
      PID=${PROJ%%|*}; PREFIX=${PROJ##*|}
      SUITE=$(npx tsx cicd/tests/src/mcp-client.ts create_test_suite \
        "{\"project_id\":\"$PID\",\"suite_name\":\"CRUD Suite $$\",\"details\":\"crud flow\"}" 2>/dev/null \
        | python3 -c "import sys,json;d=json.loads(json.load(sys.stdin)['content'][0]['text']);s=d[0] if isinstance(d,list) else d;print(s['id'])")
      echo "$PID|$PREFIX|$SUITE" > /tmp/crud-fixture.txt
      echo "FIXTURE project=$PID prefix=$PREFIX suite=$SUITE"
      [ -n "$PID" ] && [ -n "$SUITE" ] && echo "SETUP_OK"
    timeout: 20000
    expectPatterns:
      - "SETUP_OK"

  - name: "CREATE: create_test_case with preconditions"
    command: |
      IFS='|' read PID PREFIX SUITE < /tmp/crud-fixture.txt
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_test_case \
        "{\"data\":{\"testprojectid\":\"$PID\",\"testsuiteid\":\"$SUITE\",\"name\":\"CRUD Lifecycle Case\",\"authorlogin\":\"admin\",\"summary\":\"<p>ORIGINAL</p>\",\"preconditions\":\"<p>PRECOND_MARKER</p>\",\"importance\":2,\"execution_type\":1,\"status\":1,\"steps\":[]}}" 2>/dev/null)
      EXT=$(echo "$RESULT" | python3 -c "import sys,json;d=json.loads(json.load(sys.stdin)['content'][0]['text']);print(d[0]['additionalInfo']['external_id'])")
      echo "$PREFIX-$EXT" > /tmp/crud-case.txt
      echo "CREATED=$PREFIX-$EXT"
    timeout: 20000
    expectPatterns:
      - "CREATED=[A-Za-z0-9]+-[0-9]+"

  - name: "READ: verify created fields (name, summary, preconditions)"
    command: |
      TC=$(cat /tmp/crud-case.txt)
      npx tsx cicd/tests/src/mcp-client.ts read_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null | python3 -c "
      import sys,json
      tc=json.loads(json.load(sys.stdin)['content'][0]['text']); tc=tc[0] if isinstance(tc,list) else tc
      assert tc.get('name')=='CRUD Lifecycle Case', 'name mismatch'
      assert 'ORIGINAL' in (tc.get('summary') or ''), 'summary mismatch'
      assert 'PRECOND_MARKER' in (tc.get('preconditions') or ''), 'preconditions dropped'
      print('READ_OK')"
    timeout: 20000
    expectPatterns:
      - "READ_OK"

  - name: "UPDATE: change summary + importance, verify on read-back"
    command: |
      TC=$(cat /tmp/crud-case.txt)
      npx tsx cicd/tests/src/mcp-client.ts update_test_case \
        "{\"test_case_id\":\"$TC\",\"data\":{\"summary\":\"<p>UPDATED_MARKER</p>\",\"importance\":1}}" 2>/dev/null >/dev/null
      npx tsx cicd/tests/src/mcp-client.ts read_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null | python3 -c "
      import sys,json
      tc=json.loads(json.load(sys.stdin)['content'][0]['text']); tc=tc[0] if isinstance(tc,list) else tc
      assert 'UPDATED_MARKER' in (tc.get('summary') or ''), 'summary not updated'
      assert str(tc.get('importance'))=='1', 'importance not updated'
      print('UPDATE_OK')"
    timeout: 20000
    expectPatterns:
      - "UPDATE_OK"

  - name: "DELETE: hard-delete, verify case no longer exists on read-back"
    command: |
      TC=$(cat /tmp/crud-case.txt)
      npx tsx cicd/tests/src/mcp-client.ts delete_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null >/dev/null
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts read_test_case "{\"test_case_id\":\"$TC\"}" 2>/dev/null)
      echo "$RESULT" | python3 -c "
      import sys,json
      r=json.load(sys.stdin); txt=r['content'][0]['text']
      assert r.get('isError') or 'does not exist' in txt, 'case still readable after delete'
      print('DELETE_OK')"
    timeout: 20000
    expectPatterns:
      - "DELETE_OK"

criteria: |
  Verify the full test-case CRUD lifecycle through the MCP server:
  - CREATE persists name, summary, and preconditions (issue #51 regression)
  - READ returns the created values
  - UPDATE modifies summary/importance and the change is visible on read
  - DELETE removes the test case (read-back reports it no longer exists)

goal: "Self-contained CRUD lifecycle for test cases via the MCP tools"
