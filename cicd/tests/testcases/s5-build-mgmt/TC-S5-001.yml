id: TC-S5-001
name: "Flow: create_build + list_builds"
suite: s5-build-mgmt
priority: 2
timeout: 30000
dependencies: [TC-S4-001]

# Creates an OPEN build under the flow plan and lists it. The build is left
# open so s6 can record an execution against it; close_build runs in teardown.

steps:
  - name: "Create a build under the flow plan"
    command: |
      PLAN=$(cat /tmp/tl-flow/plan_id); CASE=$(cat /tmp/tl-flow/case_ext_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts create_build "{\"data\":{\"plan_id\":\"$PLAN\",\"name\":\"Flow Build for $CASE\",\"notes\":\"flow\"}}" 2>/dev/null)
      BUILD=$(echo "$RESULT" | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); o=d[0] if isinstance(d,list) else d; print(o.get('id') or o['additionalInfo']['id'])")
      echo "$BUILD" > /tmp/tl-flow/build_id
      echo "BUILD_CREATED=$BUILD"
    timeout: 20000
    expectPatterns:
      - "BUILD_CREATED=[0-9]+"

  - name: "List builds and confirm the flow build is present"
    command: |
      PLAN=$(cat /tmp/tl-flow/plan_id); BUILD=$(cat /tmp/tl-flow/build_id)
      npx tsx cicd/tests/src/mcp-client.ts list_builds "{\"plan_id\":\"$PLAN\"}" 2>/dev/null | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); d=d if isinstance(d,list) else []; b=open('/tmp/tl-flow/build_id').read().strip(); assert any(str(x.get('id'))==b for x in d),'build not listed'; print('LIST_BUILDS_OK')"
    timeout: 20000
    expectPatterns:
      - "LIST_BUILDS_OK"

criteria: |
  create_build creates an open build under the flow plan and list_builds
  returns it. (Closes the previously missing list_builds coverage.)
goal: "Create and list a build via the MCP create_build / list_builds tools"
