id: TC-S3-001
name: "Flow: list_test_suites"
suite: s3-test-suite
priority: 2
timeout: 30000
dependencies: [TC-S2-001]

steps:
  - name: "List suites and confirm the flow suite is present"
    command: |
      PID=$(cat /tmp/tl-flow/project_id); SID=$(cat /tmp/tl-flow/suite_id)
      npx tsx cicd/tests/src/mcp-client.ts list_test_suites "{\"project_id\":\"$PID\"}" 2>/dev/null | python3 -c "import sys,json,os; d=json.loads(json.load(sys.stdin)['content'][0]['text']); d=d if isinstance(d,list) else []; sid=open('/tmp/tl-flow/suite_id').read().strip(); assert any(str(s.get('id'))==sid for s in d),'flow suite not listed'; print('LIST_SUITES_OK')"
    timeout: 20000
    expectPatterns:
      - "LIST_SUITES_OK"

criteria: |
  list_test_suites returns the project's first-level suites including the
  provisioned Flow Suite.
goal: "List test suites via the MCP list_test_suites tool"
