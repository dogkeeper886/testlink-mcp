id: TC-S3-001
testlink_id: 23
name: "MCP Tool: list_test_suites"
suite: s3-test-suite
priority: 5
timeout: 30000
dependencies: [TC-S1-001]

steps:
  - name: "List suites for testlink-mcp project"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts list_test_suites \
        '{"project_id":"162"}' \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      echo "$TEXT" | grep -q "Test Data" && echo "FOUND_TEST_DATA_SUITE"
      echo "$TEXT" | grep -q "S1-Build-Deploy" && echo "FOUND_S1_SUITE"
    timeout: 15000
    expectPatterns:
      - "FOUND_TEST_DATA_SUITE"
      - "FOUND_S1_SUITE"

criteria: |
  Verify that:
  - list_test_suites returns suites for project 162 (testlink-mcp)
  - Known suites "Test Data" (271) and "S1-Build-Deploy" (279) are present

goal: "Test the list_test_suites MCP tool against real TestLink"
