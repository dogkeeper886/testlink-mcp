id: TC-S3-002
name: "Flow: list_test_cases_in_suite"
suite: s3-test-suite
priority: 3
timeout: 30000
dependencies: [TC-S2-002]

steps:
  - name: "List cases in the flow suite and confirm the flow case is present"
    command: |
      SID=$(cat /tmp/tl-flow/suite_id)
      npx tsx cicd/tests/src/mcp-client.ts list_test_cases_in_suite "{\"suite_id\":\"$SID\"}" 2>/dev/null | python3 -c "import sys,json; d=json.loads(json.load(sys.stdin)['content'][0]['text']); d=d if isinstance(d,list) else []; assert any(c.get('name')=='Flow Case' for c in d),'flow case not listed'; print('LIST_CASES_OK')"
    timeout: 20000
    expectPatterns:
      - "LIST_CASES_OK"

criteria: |
  list_test_cases_in_suite returns the cases in the flow suite, including the
  case created in TC-S2-002.
goal: "List cases in a suite via the MCP list_test_cases_in_suite tool"
