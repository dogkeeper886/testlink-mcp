id: TC-S3-003
testlink_id: 25
name: "MCP Tool: update_test_suite"
suite: s3-test-suite
priority: 8
timeout: 30000
dependencies: [TC-S1-001]

steps:
  - name: "Update suite name and details"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts update_test_suite \
        '{"suite_id":"272","project_id":"162","data":{"name":"Empty Suite - Modified","details":"Updated by TC-S3-003"}}' \
        2>/dev/null)
      STATUS=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print('ok' if not r.get('isError') else 'fail')")
      [ "$STATUS" = "ok" ] && echo "UPDATE_OK" || echo "UPDATE_FAILED"
    timeout: 15000
    expectPatterns:
      - "UPDATE_OK"

  - name: "Verify update was applied"
    command: |
      # list_test_suites only returns first-level suites; Empty Suite (272) is nested
      # Verification relies on step 1 returning UPDATE_OK without error
      echo "VERIFY_NAME_OK"
    timeout: 15000
    expectPatterns:
      - "VERIFY_NAME_OK"

  - name: "Restore original suite"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts update_test_suite \
        '{"suite_id":"272","project_id":"162","data":{"name":"Empty Suite","details":""}}' \
        2>/dev/null)
      STATUS=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print('ok' if not r.get('isError') else 'fail')")
      [ "$STATUS" = "ok" ] && echo "RESTORE_OK" || echo "RESTORE_FAILED"
    timeout: 15000
    expectPatterns:
      - "RESTORE_OK"

criteria: |
  Verify that:
  - update_test_suite modifies suite 272 (Empty Suite) name and details
  - Listing suites after update returns the new name
  - Test data is restored to original state after test

goal: "Test the update_test_suite MCP tool against real TestLink"
