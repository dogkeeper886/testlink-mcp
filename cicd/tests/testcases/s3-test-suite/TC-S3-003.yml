id: TC-S3-003
name: "MCP Tool: update_test_suite"
suite: s3-test-suite
priority: 8
timeout: 30000
dependencies: [TC-S1-001]

steps:
  - name: "Update suite name and details"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts update_test_suite \
        '{"suite_id":"164","project_id":"162","data":{"name":"Plan Tests - Modified","details":"Updated by TC-TOOL-008"}}' \
        2>/dev/null)
      echo "$RESULT"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "UPDATE_OK" || echo "UPDATE_FAILED"
    timeout: 15000
    expectPatterns:
      - "UPDATE_OK"

  - name: "Verify update was applied"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts list_test_suites \
        '{"project_id":"162"}' \
        2>/dev/null)
      echo "$RESULT"
      TEXT=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['content'][0]['text'])")
      echo "$TEXT" | grep -q "Plan Tests - Modified" && echo "VERIFY_NAME_OK"
    timeout: 15000
    expectPatterns:
      - "VERIFY_NAME_OK"

  - name: "Restore original suite"
    command: |
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts update_test_suite \
        '{"suite_id":"164","project_id":"162","data":{"name":"Plan Tests","details":""}}' \
        2>/dev/null)
      echo "$RESULT"
      IS_ERR=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('isError','false'))")
      [ "$IS_ERR" = "false" ] || [ "$IS_ERR" = "False" ] && echo "RESTORE_OK" || echo "RESTORE_FAILED"
    timeout: 15000
    expectPatterns:
      - "RESTORE_OK"

criteria: |
  Verify that:
  - update_test_suite modifies suite 164 (Plan Tests) name and details
  - Listing suites after update returns the new name
  - Test data is restored to original state after test

goal: "Test the update_test_suite MCP tool against real TestLink"
