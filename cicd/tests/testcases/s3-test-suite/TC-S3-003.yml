id: TC-S3-003
name: "Flow: update_test_suite"
suite: s3-test-suite
priority: 4
timeout: 30000
dependencies: [TC-S2-001]

steps:
  - name: "Update the flow suite details"
    command: |
      PID=$(cat /tmp/tl-flow/project_id); SID=$(cat /tmp/tl-flow/suite_id)
      RESULT=$(npx tsx cicd/tests/src/mcp-client.ts update_test_suite "{\"suite_id\":\"$SID\",\"project_id\":\"$PID\",\"data\":{\"details\":\"<p>UPDATED via flow</p>\"}}" 2>/dev/null)
      echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); assert not r.get('isError'),'update_test_suite errored'; print('UPDATE_SUITE_OK')"
    timeout: 20000
    expectPatterns:
      - "UPDATE_SUITE_OK"

criteria: |
  update_test_suite updates the flow suite without error.
goal: "Update a test suite via the MCP update_test_suite tool"
