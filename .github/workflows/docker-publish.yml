name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      judge_mode:
        description: "Test judge mode"
        required: false
        default: "simple"
        type: choice
        options:
          - "simple"
          - "dual"
      test_id:
        description: "Run a single test by ID (e.g., TC-S1-001)"
        required: false
        type: string

jobs:
  build-test:
    name: Build Tests
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s1-build-deploy
      judge_mode: ${{ inputs.judge_mode }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  publish:
    name: Build & Push Docker Image
    needs: build-test
    # Runs on the self-hosted runner (asus-rock), which is already
    # `docker login`-ed to Docker Hub — so no login step or secrets are needed.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dogkeeper886/testlink-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (uses the runner's existing Docker login)
        run: |
          # --no-cache --pull: release builds must come from current source and a
          # fresh base image, never reusing layers cached on the persistent runner.
          docker build --no-cache --pull --label org.opencontainers.image.revision=${{ github.sha }} -t testlink-mcp:build .
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag"
            docker tag testlink-mcp:build "$tag"
            docker push "$tag"
          done
