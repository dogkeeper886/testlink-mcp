name: Full Test Pipeline

on:
  workflow_dispatch:
    inputs:
      judge_mode:
        description: "Test judge mode"
        required: false
        default: "simple"
        type: choice
        options:
          - "simple"
          - "dual"
      judge_model:
        description: "LLM model for judging (if dual mode)"
        required: false
        default: "gemma3:12b-judge"
        type: string
      test_id:
        description: "Run a single test by ID (e.g., TC-S1-001)"
        required: false
        type: string

jobs:
  s1-build-deploy:
    name: "S1: Build & Deploy"
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s1-build-deploy
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  s2-test-case:
    name: "S2: Test Case Management"
    needs: s1-build-deploy
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s2-test-case
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  s3-test-suite:
    name: "S3: Test Suite Management"
    needs: s1-build-deploy
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s3-test-suite
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  s4-test-plan:
    name: "S4: Test Plan Management"
    needs: s1-build-deploy
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s4-test-plan
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  s5-build-mgmt:
    name: "S5: Build Management"
    needs: s1-build-deploy
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s5-build-mgmt
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit

  s7-requirements:
    name: "S7: Requirement Management"
    needs: s1-build-deploy
    uses: ./.github/workflows/test-suite.yml
    with:
      suite: s7-requirements
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
      test_id: ${{ inputs.test_id }}
    secrets: inherit
