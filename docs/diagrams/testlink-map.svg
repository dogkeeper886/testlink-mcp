<svg xmlns="http://www.w3.org/2000/svg" width="840" height="380" viewBox="0 0 840 380" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="darrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="840" height="380" fill="#ffffff"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">What you can manage</text>
  <text x="420" y="54" text-anchor="middle" font-size="13" fill="#64748b">The TestLink object model, end to end</text>

  <!-- connectors (drawn first, under boxes) -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none">
    <path d="M420 116 L420 132 M150 132 L690 132"/>
    <path d="M150 132 L150 156 M420 132 L420 156 M690 132 L690 156"/>
    <path d="M150 200 L150 232"/>
    <path d="M420 200 L420 232 M420 276 L420 300"/>
    <path d="M690 200 L690 232"/>
  </g>

  <!-- root -->
  <rect x="350" y="72" width="140" height="44" rx="8" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="420" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Project</text>

  <!-- level 2 -->
  <g font-size="13.5" text-anchor="middle">
    <rect x="70" y="156" width="160" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="150" y="183" fill="#1e3a8a">Test Suites</text>
    <rect x="340" y="156" width="160" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="420" y="183" fill="#1e3a8a">Test Plans</text>
    <rect x="610" y="156" width="160" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="690" y="183" fill="#1e3a8a">Requirement Specs</text>
  </g>

  <!-- level 3 -->
  <g font-size="13.5" text-anchor="middle">
    <rect x="70" y="232" width="160" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
    <text x="150" y="259" fill="#334155">Test Cases</text>
    <rect x="340" y="232" width="160" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
    <text x="420" y="259" fill="#334155">Builds</text>
    <rect x="610" y="232" width="160" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
    <text x="690" y="259" fill="#334155">Requirements</text>
  </g>

  <!-- level 4 -->
  <rect x="340" y="300" width="160" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="420" y="327" text-anchor="middle" font-size="13.5" fill="#334155">Executions</text>

  <!-- covers relationship -->
  <path d="M610 254 C 430 300, 330 300, 232 258" stroke="#9333ea" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#darrow)"/>
  <text x="420" y="296" text-anchor="middle" font-size="11.5" fill="#9333ea" font-weight="bold">covers</text>
</svg>
