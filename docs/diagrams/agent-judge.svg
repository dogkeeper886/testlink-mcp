<svg xmlns="http://www.w3.org/2000/svg" width="840" height="360" viewBox="0 0 840 360" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="840" height="360" fill="#ffffff"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">The project tests itself with an AI judge</text>
  <text x="420" y="54" text-anchor="middle" font-size="13" fill="#64748b">Two judges score every run — deterministic floor + a keyless Claude agent</text>

  <!-- runner -->
  <rect x="40" y="150" width="150" height="64" rx="9" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="115" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Test runner</text>
  <text x="115" y="197" text-anchor="middle" font-size="11.5" fill="#dbeafe">cicd/tests</text>

  <!-- simple judge -->
  <rect x="270" y="78" width="200" height="64" rx="9" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="370" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Simple judge</text>
  <text x="370" y="123" text-anchor="middle" font-size="11.5" fill="#15803d">deterministic · always-on floor</text>

  <!-- agent judge -->
  <rect x="270" y="222" width="200" height="64" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="370" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Agent judge</text>
  <text x="370" y="267" text-anchor="middle" font-size="11.5" fill="#2563eb">ACP client · opt-in</text>

  <!-- ACP agent -->
  <rect x="540" y="222" width="190" height="64" rx="9" fill="#f5f3ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="635" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b21a8">Claude ACP agent</text>
  <text x="635" y="267" text-anchor="middle" font-size="11.5" fill="#7c3aed">keyless · no API key</text>

  <!-- verdict -->
  <rect x="600" y="92" width="200" height="56" rx="9" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="700" y="116" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#92400e">Verdict</text>
  <text x="700" y="134" text-anchor="middle" font-size="11.5" fill="#b45309">pass = simple &amp; agent</text>

  <g stroke="#475569" stroke-width="1.7" fill="none" marker-end="url(#arrow)">
    <path d="M190 172 C 230 172, 235 112, 268 110"/>
    <path d="M190 192 C 230 192, 235 252, 268 254"/>
    <path d="M470 254 L 538 254"/>
    <path d="M470 110 L 598 116"/>
  </g>
  <!-- agent verdict contribution -->
  <path d="M635 222 C 660 195, 685 165, 700 150" stroke="#9333ea" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="500" y="246" font-size="11" fill="#9333ea">ACP / stdio</text>
  <text x="248" y="318" text-anchor="middle" font-size="11.5" fill="#64748b">Default runs are simple-only; dual mode adds the agent judge.</text>
</svg>
