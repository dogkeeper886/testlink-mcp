<svg xmlns="http://www.w3.org/2000/svg" width="840" height="290" viewBox="0 0 840 290" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="840" height="290" fill="#ffffff"/>
  <text x="420" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">How fixtures are threaded</text>
  <text x="420" y="52" text-anchor="middle" font-size="12.5" fill="#64748b">No hardcoded IDs — a producer writes an ID, a later consumer reads it</text>

  <!-- producer -->
  <rect x="30" y="96" width="210" height="78" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="135" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Producer step</text>
  <text x="135" y="144" text-anchor="middle" font-size="11.5" fill="#2563eb">TC-S2-002</text>
  <text x="135" y="161" text-anchor="middle" font-size="11.5" fill="#64748b">create_test_case</text>

  <!-- scratch store -->
  <rect x="330" y="80" width="180" height="120" rx="9" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="420" y="104" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#334155">/tmp/tl-flow/</text>
  <g font-size="11" fill="#475569" text-anchor="middle">
    <text x="420" y="126">project_id · prefix</text>
    <text x="420" y="144">suite_id</text>
    <text x="420" y="162" font-weight="bold" fill="#0f172a">case_ext_id (MFT-N)</text>
    <text x="420" y="180">plan_id · build_id …</text>
  </g>

  <!-- consumer -->
  <rect x="600" y="96" width="210" height="78" rx="9" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="705" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Consumer step</text>
  <text x="705" y="144" text-anchor="middle" font-size="11.5" fill="#15803d">TC-S4-001</text>
  <text x="705" y="161" text-anchor="middle" font-size="11.5" fill="#64748b">add_test_case_to_test_plan</text>

  <g stroke="#475569" stroke-width="1.7" fill="none" marker-end="url(#arrow)">
    <path d="M240 135 L328 135"/>
    <path d="M512 145 L598 145"/>
  </g>
  <text x="284" y="126" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">writes</text>
  <text x="556" y="136" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">reads</text>

  <text x="420" y="244" text-anchor="middle" font-size="12" fill="#334155">Run order is declared with <tspan font-weight="bold">dependencies</tspan> — the consumer runs only after the producer.</text>
  <text x="420" y="264" text-anchor="middle" font-size="11" fill="#94a3b8">dependencies: [TC-S2-002]</text>
</svg>
