<svg xmlns="http://www.w3.org/2000/svg" width="840" height="340" viewBox="0 0 840 340" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="840" height="340" fill="#ffffff"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">How testlink-mcp connects</text>
  <text x="420" y="56" text-anchor="middle" font-size="13" fill="#64748b">Any MCP client drives TestLink in natural language</text>

  <!-- MCP clients -->
  <text x="120" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">MCP CLIENTS</text>
  <g fill="#eff6ff" stroke="#2563eb" stroke-width="1.5">
    <rect x="30" y="104" width="180" height="44" rx="8"/>
    <rect x="30" y="160" width="180" height="44" rx="8"/>
    <rect x="30" y="216" width="180" height="44" rx="8"/>
  </g>
  <g font-size="14" fill="#1e3a8a" text-anchor="middle">
    <text x="120" y="131">Claude Code</text>
    <text x="120" y="187">Cursor</text>
    <text x="120" y="243">Dify / any MCP app</text>
  </g>

  <!-- server -->
  <rect x="330" y="132" width="190" height="104" rx="10" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="425" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">testlink-mcp</text>
  <text x="425" y="192" text-anchor="middle" font-size="12.5" fill="#dbeafe">MCP server</text>
  <text x="425" y="210" text-anchor="middle" font-size="12.5" fill="#dbeafe">Node · stdio · 27 tools</text>

  <!-- TestLink + DB -->
  <rect x="640" y="120" width="170" height="60" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="725" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">TestLink</text>
  <text x="725" y="165" text-anchor="middle" font-size="12" fill="#15803d">XML-RPC API</text>
  <path d="M655 250 a70 12 0 0 0 140 0 v-34 a70 12 0 0 0 -140 0 z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M655 216 a70 12 0 0 0 140 0" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="725" y="244" text-anchor="middle" font-size="12" fill="#475569">MySQL / Postgres</text>

  <!-- arrows: clients -> server -->
  <g stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <path d="M210 126 C 270 126, 280 175, 328 178"/>
    <path d="M210 182 L 328 184"/>
    <path d="M210 238 C 270 238, 280 195, 328 190"/>
    <!-- server -> TestLink -->
    <path d="M520 165 L 638 152"/>
    <!-- TestLink -> DB -->
    <path d="M725 180 L 725 210"/>
  </g>
  <text x="270" y="150" font-size="11.5" fill="#2563eb" font-weight="bold">MCP · stdio</text>
  <text x="545" y="142" font-size="11.5" fill="#16a34a" font-weight="bold">XML-RPC</text>
</svg>
