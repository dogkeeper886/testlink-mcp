<svg xmlns="http://www.w3.org/2000/svg" width="840" height="300" viewBox="0 0 840 300" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="840" height="300" fill="#ffffff"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">One request, end to end</text>

  <!-- step boxes (two rows, left-to-right then wrap) -->
  <g stroke-width="1.5">
    <rect x="24"  y="70" width="172" height="70" rx="9" fill="#eff6ff" stroke="#2563eb"/>
    <rect x="236" y="70" width="172" height="70" rx="9" fill="#eff6ff" stroke="#2563eb"/>
    <rect x="448" y="70" width="172" height="70" rx="9" fill="#1d4ed8" stroke="#1e3a8a"/>
    <rect x="660" y="70" width="156" height="70" rx="9" fill="#ecfdf5" stroke="#16a34a"/>
  </g>

  <text x="110" y="100" text-anchor="middle" font-size="13.5" fill="#1e3a8a">You ask, in plain</text>
  <text x="110" y="118" text-anchor="middle" font-size="13.5" fill="#1e3a8a">English</text>
  <text x="110" y="156" text-anchor="middle" font-size="11.5" fill="#64748b">"Add detailed steps to MFT-12"</text>

  <text x="322" y="100" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1e3a8a">Claude</text>
  <text x="322" y="118" text-anchor="middle" font-size="12" fill="#1e3a8a">picks the MCP tool</text>
  <text x="322" y="156" text-anchor="middle" font-size="11.5" fill="#64748b">update_test_case(...)</text>

  <text x="534" y="100" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#ffffff">testlink-mcp</text>
  <text x="534" y="118" text-anchor="middle" font-size="12" fill="#dbeafe">validates + routes</text>
  <text x="534" y="156" text-anchor="middle" font-size="11.5" fill="#64748b">XML-RPC call</text>

  <text x="738" y="100" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#166534">TestLink</text>
  <text x="738" y="118" text-anchor="middle" font-size="12" fill="#15803d">applies the change</text>

  <g stroke="#475569" stroke-width="1.7" fill="none" marker-end="url(#arrow)">
    <path d="M196 105 L 234 105"/>
    <path d="M408 105 L 446 105"/>
    <path d="M620 105 L 658 105"/>
  </g>

  <!-- return arrow -->
  <path d="M738 140 L 738 210 L 110 210 L 110 142" stroke="#16a34a" stroke-width="1.7" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="420" y="232" text-anchor="middle" font-size="12.5" fill="#16a34a" font-weight="bold">result flows back as a plain-language answer</text>
</svg>
